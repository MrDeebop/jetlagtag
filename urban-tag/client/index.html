<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>URBAN TAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SCREEN 1 — LOBBY  (host only — sets up players and starts the game)
  ════════════════════════════════════════════════════════════════════════════ -->
  <section id="screen-lobby" class="screen active">
    <div class="screen-inner">
      <div class="logo-block">
        <h1 class="logo">URBAN<br>TAG</h1>
        <p class="tagline">city-scale. no rules. run.</p>
      </div>

      <div class="card" id="lobby-card">
        <p class="card-label">PLAYERS  <span class="muted">(2 – 5)</span></p>
        <div id="player-inputs">
          <!-- rows injected by app.js -->
        </div>
        <button class="btn-ghost btn-sm" id="btn-add-player">+ ADD PLAYER</button>
      </div>

      <button class="btn-primary" id="btn-create-game">CREATE GAME</button>

      <p class="hint" id="lobby-hint"></p>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SCREEN 2 — GOAL SETUP  (host only — between rounds)
  ════════════════════════════════════════════════════════════════════════════ -->
  <section id="screen-goal-setup" class="screen">
    <div class="screen-inner">
      <div class="section-header">
        <p class="card-label">SET GOAL FOR</p>
        <h2 id="goal-runner-name" class="runner-name-display">—</h2>
      </div>

      <div class="card">
        <p class="card-label">COORDINATES</p>
        <p class="hint">Open Google Maps, long-press a spot, copy the coordinates shown at the bottom.</p>
        <div class="coord-row">
          <label>LAT<input id="goal-lat" type="number" step="any" placeholder="e.g. 40.7128" /></label>
          <label>LNG<input id="goal-lng" type="number" step="any" placeholder="e.g. -74.0060" /></label>
        </div>
        <label>HINT FOR RUNNER
          <input id="goal-label" type="text" placeholder="e.g. The old clock tower" />
        </label>
      </div>

      <button class="btn-primary" id="btn-set-goal">SET GOAL &amp; START ROUND</button>
      <p class="hint" id="goal-hint"></p>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SCREEN 3 — MAIN GAME  (all players)
  ════════════════════════════════════════════════════════════════════════════ -->
  <section id="screen-game" class="screen">
    <div class="screen-inner">

      <!-- Top bar: who am I? -->
      <div class="top-bar">
        <div id="role-badge" class="role-badge">—</div>
        <div id="coin-display" class="coin-display">🪙 —</div>
      </div>

      <!-- Goal hint (runner only) -->
      <div id="goal-banner" class="goal-banner hidden">
        <span class="card-label">YOUR GOAL</span>
        <span id="goal-hint-text"></span>
      </div>

      <!-- ── Transport ───────────────────────────────────────────────── -->
      <div class="card" id="transport-card">
        <p class="card-label">TRANSPORT</p>
        <div class="transport-modes" id="transport-modes">
          <!-- mode buttons injected by app.js -->
        </div>
        <div id="transport-active" class="transport-active hidden">
          <div class="timer-row">
            <span id="transport-mode-label">—</span>
            <span id="transport-elapsed" class="timer-digits">00:00</span>
            <span id="transport-est-cost" class="est-cost">≈ 0 🪙</span>
          </div>
          <button class="btn-danger" id="btn-transport-stop">STOP &amp; PAY</button>
        </div>
      </div>

      <!-- ── Runner actions ─────────────────────────────────────────── -->
      <div id="runner-card" class="card hidden">
        <p class="card-label">RUNNER ACTIONS</p>
        <button class="btn-primary" id="btn-check-goal">📍 CHECK IF I REACHED MY GOAL</button>
        <p id="goal-distance-text" class="distance-text"></p>
      </div>

      <!-- ── Chaser actions ─────────────────────────────────────────── -->
      <div id="chaser-card" class="card hidden">
        <p class="card-label">CHASER ACTIONS</p>
        <button class="btn-danger" id="btn-tag-runner">🏷 I TAGGED THE RUNNER</button>
      </div>

      <!-- ── Challenges ─────────────────────────────────────────────── -->
      <div class="card" id="challenges-card">
        <p class="card-label">CHALLENGES</p>
        <ul id="challenge-list">
          <!-- items injected by app.js -->
        </ul>
      </div>

      <!-- ── Scoreboard ─────────────────────────────────────────────── -->
      <div class="card" id="scoreboard-card">
        <p class="card-label">SCOREBOARD</p>
        <ul id="scoreboard-list">
          <!-- items injected by app.js -->
        </ul>
      </div>

    </div><!-- /screen-inner -->

    <!-- Player selector anchored to bottom -->
    <div id="player-selector-bar">
      <span class="card-label">I AM</span>
      <select id="select-player">
        <!-- options injected by app.js -->
      </select>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SCREEN 4 — GAME OVER
  ════════════════════════════════════════════════════════════════════════════ -->
  <section id="screen-gameover" class="screen">
    <div class="screen-inner">
      <div class="logo-block">
        <h1 class="logo">GAME<br>OVER</h1>
      </div>

      <div class="card">
        <p class="card-label">FINAL SCORES</p>
        <ul id="final-scores-list">
          <!-- injected by app.js -->
        </ul>
      </div>

      <button class="btn-primary" id="btn-new-game">PLAY AGAIN</button>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════════════
       TOAST LAYER
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Socket.IO client is served automatically by the Express/Socket.IO server -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
